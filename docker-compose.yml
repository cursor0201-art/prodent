version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: prodent_db
      POSTGRES_USER: prodent_user
      POSTGRES_PASSWORD: prodent_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    command: gunicorn --bind 0.0.0.0:8000 core.wsgi:application
    volumes:
      - ./backend:/app
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=prodent_db
      - DB_USER=prodent_user
      - DB_PASSWORD=prodent_password
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=False
      - ALLOWED_HOSTS=backend,localhost,127.0.0.1
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
    command: celery -A core worker -l info
    volumes:
      - ./backend:/app
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=prodent_db
      - DB_USER=prodent_user
      - DB_PASSWORD=prodent_password
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - backend
    restart: unless-stopped

  celery_beat:
    build:
      context: ./backend
    command: celery -A core beat -l info
    volumes:
      - ./backend:/app
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=prodent_db
      - DB_USER=prodent_user
      - DB_PASSWORD=prodent_password
      - DB_HOST=db
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
